name: Deploy Playground

on:
  push:
    branches: [main]
    paths:
      - "apps/playground/**"
      - ".github/workflows/deploy-playground.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-playground
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::584000479246:role/swordthain-playground-ci
          aws-region: us-east-1

      - name: Sync frontend to S3
        working-directory: apps/playground
        run: |
          aws s3 sync . s3://swordthain-demo-sites/ \
            --delete \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "lambda/*" \
            --exclude "lambda.zip" \
            --exclude "*.pyc" \
            --exclude "__pycache__/*"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and deploy Lambda
        working-directory: apps/playground/lambda
        run: |
          python3 -m pip install -r requirements.txt -t .
          zip -r ../lambda.zip . -x "*.pyc" -x "__pycache__/*" -x "README.md"
          aws lambda update-function-code \
            --function-name swordthain-automation \
            --zip-file fileb://../lambda.zip \
            --region us-east-1

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E3HUQ60BN7KVJR --paths "/*"
