name: Validate Media App

on:
  pull_request:
    paths:
      - "apps/media-app/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/media-app
        run: npm ci

      - name: Type-check and build (no AWS credentials required)
        working-directory: apps/media-app
        run: npm run build
