name: Deploy Media App

on:
  push:
    branches: [main]
    paths:
      - "apps/media-app/**"
      - ".github/workflows/deploy-media-app.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-media-app
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/media-app
        run: npm ci

      - name: Build
        working-directory: apps/media-app
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::584000479246:role/swordthain-media-app-ci
          aws-region: us-east-1

      - name: Sync to S3
        working-directory: apps/media-app
        # Bucket is eu-west-1 (SwordthainMediaAppDataStack) even though this
        # job's default region is us-east-1 (matching the CloudFront
        # invalidation step below, which needs no region-specific override —
        # see infra/README.md's "Region split" section) — explicit --region
        # avoids a repeat of the real PermanentRedirect this exact class of
        # region mismatch caused during the region migration.
        run: aws s3 sync dist/ s3://swordthain-site-584000479246/ --delete --region eu-west-1

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E2XHWRDIR9WK33 --paths "/*"
