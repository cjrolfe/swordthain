name: Validate Playground

on:
  pull_request:
    paths:
      - "apps/playground/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile-check Lambda source
        working-directory: apps/playground/lambda
        run: python3 -m py_compile *.py ai_providers/*.py
